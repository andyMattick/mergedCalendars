<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Unified School Calendar</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    .filters button { margin-right: 10px; padding: 8px 12px; }
    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .day { border: 1px solid #ccc; padding: 6px; min-height: 120px; position: relative; }
    .day-number { font-weight: bold; }
    .event { margin-top: 4px; padding: 2px 4px; border-radius: 4px; font-size: 12px; }
    .LS { background: #cce5ff; }
    .MS { background: #d4edda; }
    .HS { background: #f8d7da; }
    textarea { width: 100%; height: 40px; margin-top: 6px; font-size: 12px; }
  </style>
</head>

<body>

<h1>Unified School Calendar</h1>

<div class="filters">
  <button onclick="setFilter('ALL')">All</button>
  <button onclick="setFilter('LS')">Lower School</button>
  <button onclick="setFilter('MS')">Middle School</button>
  <button onclick="setFilter('HS')">High School</button>
</div>

<h2 id="monthTitle"></h2>
<div id="calendar" class="calendar"></div>

<button onclick="downloadCalendar()">Download Unified Calendar JSON</button>

<script>
// ------------------------------------------------------------
// 1. SAMPLE EVENT DATA (replace with your extracted PDF data)
// ------------------------------------------------------------
const events = [
  { date: "2026-08-02", division: "HS", title: "HS Peer Leadership Retreat" },
  { date: "2026-08-03", division: "MS", title: "MS CogAT Testing (New 6th Grade)" },
  { date: "2026-08-03", division: "LS", title: "New Faculty Orientation" },
  // Add all LS/MS/HS events here...
];

// ------------------------------------------------------------
// 2. NOTES STORAGE
// ------------------------------------------------------------
function saveNote(date, text) {
  localStorage.setItem("note_" + date, text);
}

function loadNote(date) {
  return localStorage.getItem("note_" + date) || "";
}

// ------------------------------------------------------------
// 3. FILTERING
// ------------------------------------------------------------
let currentFilter = "ALL";
function setFilter(f) {
  currentFilter = f;
  renderCalendar(currentMonth);
}

// ------------------------------------------------------------
// 4. CALENDAR RENDERING
// ------------------------------------------------------------
const currentMonth = new Date(2026, 7); // August 2026

function renderCalendar(month) {
  const year = month.getFullYear();
  const monthIndex = month.getMonth();
  document.getElementById("monthTitle").innerText =
    month.toLocaleString("default", { month: "long" }) + " " + year;

  const firstDay = new Date(year, monthIndex, 1);
  const startDay = firstDay.getDay();
  const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();

  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  // Empty cells before the first day
  for (let i = 0; i < startDay; i++) {
    calendar.appendChild(document.createElement("div"));
  }

  // Actual days
  for (let day = 1; day <= daysInMonth; day++) {
    const cell = document.createElement("div");
    cell.className = "day";

    const dateStr = `${year}-${String(monthIndex + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;

    const num = document.createElement("div");
    num.className = "day-number";
    num.innerText = day;
    cell.appendChild(num);

    // Events
    events
      .filter(e => e.date === dateStr)
      .filter(e => currentFilter === "ALL" || e.division === currentFilter)
      .forEach(e => {
        const div = document.createElement("div");
        div.className = "event " + e.division;
        div.innerText = `${e.division}: ${e.title}`;
        cell.appendChild(div);
      });

    // Notes
    const note = document.createElement("textarea");
    note.value = loadNote(dateStr);
    note.oninput = () => saveNote(dateStr, note.value);
    cell.appendChild(note);

    calendar.appendChild(cell);
  }
}

renderCalendar(currentMonth);

// ------------------------------------------------------------
// 5. DOWNLOAD UNIFIED CALENDAR
// ------------------------------------------------------------
function downloadCalendar() {
  const blob = new Blob([JSON.stringify(events, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "unified-calendar.json";
  a.click();
  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
