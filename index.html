<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Unified School Calendar</title>

  <!-- PDF.js for client-side PDF reading (works on GitHub Pages) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { margin-bottom: 10px; }
    .filters button, .controls button { margin-right: 10px; padding: 8px 12px; cursor: pointer; }
    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 10px; }
    .day { border: 1px solid #ccc; padding: 6px; min-height: 120px; background: #fafafa; }
    .day-number { font-weight: bold; margin-bottom: 4px; }
    .event { margin-top: 4px; padding: 2px 4px; border-radius: 4px; font-size: 12px; position: relative; }
    .LS { background: #cce5ff; }
    .MS { background: #d4edda; }
    .HS { background: #f8d7da; }
    .ALL { background: #fff3cd; }
    textarea { width: 100%; height: 40px; margin-top: 6px; font-size: 12px; box-sizing: border-box; }
    .controls { margin-top: 15px; margin-bottom: 10px; }
    .delete-btn { float:right; background:none; border:none; color:#900; font-size:12px; cursor:pointer; }
  </style>
</head>

<body>

<h1>Unified School Calendar</h1>

<!-- Division Filters -->
<div class="filters">
  <button onclick="setFilter('ALL')">All</button>
  <button onclick="setFilter('LS')">Lower School</button>
  <button onclick="setFilter('MS')">Middle School</button>
  <button onclick="setFilter('HS')">High School</button>
</div>

<!-- PDF Upload -->
<div class="controls">
  <h3>Add Events From Faculty Planner PDF</h3>
  <input type="file" id="pdfInput" accept=".pdf">
  <button onclick="extractEventsFromPDF()">Add Events</button>
  <button onclick="resetCalendar()">Upload New Calendar</button>
</div>

<!-- Month Selector -->
<div class="controls">
  <label><strong>Select Month:</strong></label>
  <select id="monthSelect" onchange="jumpToMonth()">
    <option value="2026-01">January 2026</option>
    <option value="2026-02">February 2026</option>
    <option value="2026-03">March 2026</option>
    <option value="2026-04">April 2026</option>
    <option value="2026-05">May 2026</option>
    <option value="2026-06">June 2026</option>
    <option value="2026-07">July 2026</option>
    <option value="2026-08">August 2026</option>
    <option value="2026-09">September 2026</option>
    <option value="2026-10">October 2026</option>
    <option value="2026-11">November 2026</option>
    <option value="2026-12">December 2026</option>
  </select>
</div>

<h2 id="monthTitle"></h2>
<div id="calendar" class="calendar"></div>

<!-- Export Buttons -->
<div class="controls">
  <button onclick="prevMonth()">Previous Month</button>
  <button onclick="nextMonth()">Next Month</button>
  <button onclick="downloadCalendar()">Download JSON</button>
  <button onclick="downloadCSV()">Download CSV</button>
</div>

<script>
// ------------------------------------------------------------
// EVENT STORAGE
// ------------------------------------------------------------
let events = [];

// ------------------------------------------------------------
// NOTES STORAGE
// ------------------------------------------------------------
function saveNote(date, text) {
  localStorage.setItem("note_" + date, text);
}
function loadNote(date) {
  return localStorage.getItem("note_" + date) || "";
}

// ------------------------------------------------------------
// FILTERING
// ------------------------------------------------------------
let currentFilter = "ALL";
function setFilter(f) {
  currentFilter = f;
  renderCalendar(currentMonth);
}

// ------------------------------------------------------------
// MONTH NAVIGATION
// ------------------------------------------------------------
let currentMonth = new Date(2026, 7);

function prevMonth() {
  currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1);
  renderCalendar(currentMonth);
}
function nextMonth() {
  currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1);
  renderCalendar(currentMonth);
}
function jumpToMonth() {
  const value = document.getElementById("monthSelect").value;
  const [year, month] = value.split("-");
  currentMonth = new Date(Number(year), Number(month) - 1, 1);
  renderCalendar(currentMonth);
}

// ------------------------------------------------------------
// RESET CALENDAR
// ------------------------------------------------------------
function resetCalendar() {
  events = [];
  localStorage.clear();
  renderCalendar(currentMonth);
  alert("Calendar cleared. You may now upload a new PDF.");
}

// ------------------------------------------------------------
// DELETE EVENT
// ------------------------------------------------------------
function deleteEvent(date, division, title) {
  events = events.filter(e => !(e.date === date && e.division === division && e.title === title));
  renderCalendar(currentMonth);
}

// ------------------------------------------------------------
// PDF EVENT EXTRACTION
// ------------------------------------------------------------
async function extractEventsFromPDF() {
  const file = document.getElementById("pdfInput").files[0];
  if (!file) return alert("Please select a PDF first.");

  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

    let text = "";
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join(" ") + "\n";
    }

    const extracted = parseEvents(text);
    mergeEvents(extracted);
    renderCalendar(currentMonth);

    alert(`Processed ${extracted.length} events from PDF.`);
  } catch (err) {
    console.error(err);
    alert("Error reading PDF.");
  }
}

// ------------------------------------------------------------
// PARSER (tailored to your planners)
// ------------------------------------------------------------
function parseEvents(text) {
  const results = [];
  text = text.replace(/\s+/g, " ").trim();

  const monthMap = {
    January:"01", February:"02", March:"03", April:"04",
    May:"05", June:"06", July:"07", August:"08",
    September:"09", October:"10", November:"11", December:"12"
  };

  const monthHeaderRegex = /(January|February|March|April|May|June|July|August|September|October|November|December)\s+20\d\d/i;
  const sections = text.split(/(?=[A-Z][a-z]+ 20\d\d)/);

  sections.forEach(section => {
    const headerMatch = section.match(monthHeaderRegex);
    if (!headerMatch) return;

    const monthName = headerMatch[1];
    const year = headerMatch[0].match(/20\d\d/)[0];
    const month = monthMap[monthName];

    const dayRegex = /\b([1-9]|[12]\d|3[01])\b/g;
    const dayMatches = [...section.matchAll(dayRegex)].map(m => m[1]);

    dayMatches.forEach(day => {
      const date = `${year}-${month}-${String(day).padStart(2, "0")}`;
      const dayPattern = new RegExp(`\\b${day}\\b([^\\d]+)`, "i");
      const eventMatch = section.match(dayPattern);
      if (!eventMatch) return;

      const raw = eventMatch[1].trim();

      raw.split(/(?=\bLS\b|\bMS\b|\bHS\b|\bALL\b)/).forEach(chunk => {
        chunk = chunk.trim();
        if (!chunk) return;

        let division = "ALL";
        if (/\bLS\b/.test(chunk)) division = "LS";
        if (/\bMS\b/.test(chunk)) division = "MS";
        if (/\bHS\b/.test(chunk)) division = "HS";

        const title = chunk.replace(/\b(LS|MS|HS|ALL)\b/g, "").trim();
        if (title.length > 0) results.push({ date, division, title });
      });
    });
  });

  return results;
}

// ------------------------------------------------------------
// MERGE + DEDUPE
// ------------------------------------------------------------
function mergeEvents(newEvents) {
  const seen = new Set(events.map(e => `${e.date}|${e.division}|${e.title}`));
  newEvents.forEach(e => {
    const key = `${e.date}|${e.division}|${e.title}`;
    if (!seen.has(key)) {
      events.push(e);
      seen.add(key);
    }
  });
}

// ------------------------------------------------------------
// CALENDAR RENDERING
// ------------------------------------------------------------
function renderCalendar(month) {
  const year = month.getFullYear();
  const monthIndex = month.getMonth();
  document.getElementById("monthTitle").innerText =
    month.toLocaleString("default", { month: "long" }) + " " + year;

  const firstDay = new Date(year, monthIndex, 1);
  const startDay = firstDay.getDay();
  const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();

  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  for (let i = 0; i < startDay; i++) calendar.appendChild(document.createElement("div"));

  for (let day = 1; day <= daysInMonth; day++) {
    const cell = document.createElement("div");
    cell.className = "day";

    const dateStr = `${year}-${String(monthIndex + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;

    const num = document.createElement("div");
    num.className = "day-number";
    num.innerText = day;
    cell.appendChild(num);

    events
      .filter(e => e.date === dateStr)
      .filter(e => currentFilter === "ALL" || e.division === currentFilter)
      .forEach(e => {
        const div = document.createElement("div");
        div.className = "event " + e.division;
        div.innerHTML = `
          ${e.division}: ${e.title}
          <button class="delete-btn" onclick="deleteEvent('${e.date}','${e.division}','${e.title}')">✖</button>
        `;
        cell.appendChild(div);
      });

    const note = document.createElement("textarea");
    note.value = loadNote(dateStr);
    note.oninput = () => saveNote(dateStr, note.value);
    cell.appendChild(note);

    calendar.appendChild(cell);
  }
}

renderCalendar(currentMonth);

// ------------------------------------------------------------
// DOWNLOAD JSON
// ------------------------------------------------------------
function downloadCalendar() {
  const blob = new Blob([JSON.stringify(events, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "unified-calendar.json";
  a.click();
  URL.revokeObjectURL(url);
}

// ------------------------------------------------------------
// DOWNLOAD CSV
// ------------------------------------------------------------
function downloadCSV() {
  let csv = "date,division,title\n";
  events.forEach(e => {
    csv += `${e.date},${e.division},"${e.title.replace(/"/g, '""')}"\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "unified-calendar.csv";
  a.click();
  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
